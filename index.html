<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পদার্থ সহকারী - Physics Chatbot</title>
    
    <!-- Google Fonts: Tiro Bangla -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">

    <!-- KaTeX CSS for Math Rendering -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
    
    <!-- PDF.js for PDF Parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    
    <!-- KaTeX JS Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>

    <style>
        /* ================= CSS VARIABLES ================= */
        :root {
            --primary: #4F46E5;
            --primary-light: #EEF2FF;
            --primary-hover: #4338CA;
            --bg: #F9FAFB;
            --surface: #FFFFFF;
            --text: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --user-bubble: #4F46E5;
            --bot-bubble: #FFFFFF;
            --danger: #EF4444;
            --success: #10B981;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --transition: all 0.3s ease;
            --font-main: 'Tiro Bangla', serif;
        }

        [data-theme="dark"] {
            --primary: #818CF8;
            --primary-light: #312E81;
            --primary-hover: #6366F1;
            --bg: #0F172A;
            --surface: #1E293B;
            --text: #F1F5F9;
            --text-muted: #94A3B8;
            --border: #334155;
            --user-bubble: #4F46E5;
            --bot-bubble: #1E293B;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        /* ================= RESET & BASE ================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
            font-size: 1.05rem;
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            color: inherit;
            transition: var(--transition);
            font-family: var(--font-main);
        }

        input, textarea {
            font-family: var(--font-main);
            color: var(--text);
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            transition: var(--transition);
        }

        /* ================= LAYOUT ================= */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--primary);
        }

        .chat-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .bubble {
            padding: 14px 18px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            line-height: 1.6;
            word-wrap: break-word;
            font-size: 1.1rem;
        }

        .message.user .bubble {
            background-color: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .message.model .bubble {
            background-color: var(--bot-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 2px;
        }

        /* ================= INPUT AREA ================= */
        .input-area {
            padding: 16px;
            background-color: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px;
        }

        #messageInput {
            flex-grow: 1;
            border: none;
            background: transparent;
            resize: none;
            max-height: 120px;
            min-height: 40px;
            padding: 8px;
            font-size: 1rem;
        }

        .primary-btn {
            background-color: var(--primary);
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* AI Action Buttons */
        .ai-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .ai-action-btn {
            font-size: 0.85rem;
            padding: 5px 12px;
            border-radius: 20px;
            background-color: var(--primary-light);
            color: var(--primary);
            border: 1px solid var(--primary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Standard Panels, Toasts, and Animations remain same as previous version but with Tiro font */
        .panel {
            position: fixed;
            top: 0; bottom: 0; width: 320px;
            background-color: var(--surface);
            box-shadow: var(--shadow);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }
        .panel-left { left: 0; transform: translateX(-100%); border-right: 1px solid var(--border); }
        .panel-right { right: 0; transform: translateX(100%); border-left: 1px solid var(--border); }
        .panel.open { transform: translateX(0); }
        .panel-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
        .panel-body { padding: 16px; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 16px; }
        .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.5); z-index: 50; display: none; opacity: 0; transition: opacity 0.3s ease; }
        .overlay.active { display: block; opacity: 1; }
        .toast-container { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .toast { background: #333; color: white; padding: 8px 16px; border-radius: 20px; font-size: 0.9rem; margin-bottom: 8px; }
        
        .kb-item { background: var(--bg); border: 1px solid var(--border); padding: 10px; border-radius: 8px; }
        .kb-item-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; }
        .kb-item-content { font-size: 0.85rem; color: var(--text-muted); }

        .icon-btn { padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background-color: var(--bg); color: var(--text); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message { display: flex; max-width: 85%; animation: fadeInUp 0.3s ease; position: relative; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.model { align-self: flex-start; }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-title">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"></circle>
                <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(45 12 12)"></ellipse>
                <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(-45 12 12)"></ellipse>
            </svg>
            পদার্থ সহকারী
        </div>
        <div class="header-actions">
            <button class="icon-btn" onclick="toggleTheme()" title="থিম পরিবর্তন">
                <svg id="themeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path id="moonPath" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    <path id="sunPath" style="display:none;" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42M17 12a5 5 0 1 1-10 0 5 5 0 0 1 10 0z"></path>
                </svg>
            </button>
            <button class="icon-btn" onclick="togglePanel('settingsPanel')" title="সেটিংস">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </div>
    </header>

    <div class="chat-container" id="chatContainer"></div>

    <div class="input-area">
        <div style="display: flex; gap: 16px; margin-bottom: 8px;">
            <button class="text-sm text-muted flex items-center gap-2" onclick="togglePanel('knowledgePanel')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                নলেজবেজ
            </button>
            <button class="text-sm text-muted flex items-center gap-2" onclick="generateQuiz()">✨ কুইজ</button>
            <button class="text-sm text-muted flex items-center gap-2" onclick="summarizeKnowledge()">✨ সারাংশ</button>
        </div>
        <div class="input-wrapper">
            <button class="icon-btn" onclick="document.getElementById('fileUpload').click()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
            </button>
            <input type="file" id="fileUpload" style="display: none;" accept=".txt, .pdf" onchange="handleFileUpload(event)">
            <textarea id="messageInput" placeholder="পদার্থবিজ্ঞান নিয়ে কোনো প্রশ্ন করো..." rows="1" oninput="autoResize(this)" onkeydown="handleEnter(event)"></textarea>
            <button class="primary-btn" id="sendBtn" onclick="sendMessage()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeAllPanels()"></div>

    <div class="panel panel-left" id="knowledgePanel">
        <div class="panel-header"><span>নলেজবেজ</span><button class="icon-btn" onclick="togglePanel('knowledgePanel')">✕</button></div>
        <div class="panel-body">
            <textarea id="manualNote" style="width: 100%" rows="3" placeholder="নতুন নোট লিখুন..."></textarea>
            <button class="primary-btn" style="width: 100%; margin-top: 8px;" onclick="addManualNote()">সংরক্ষণ</button>
            <div id="kbList" style="margin-top: 10px; display: flex; flex-direction: column; gap: 8px;"></div>
        </div>
    </div>

    <div class="panel panel-right" id="settingsPanel">
        <div class="panel-header"><span>সেটিংস</span><button class="icon-btn" onclick="togglePanel('settingsPanel')">✕</button></div>
        <div class="panel-body">
            <label style="font-weight: bold; font-size: 0.9rem;">Gemini API Key</label>
            <input type="password" id="apiKeyInput" style="width: 100%; margin-top: 8px;" placeholder="AIzaSy...">
            <button class="primary-btn" style="width: 100%; margin-top: 8px;" onclick="saveApiKey()">সংরক্ষণ</button>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=";
        const LS_KEY_API = "physics_gemini_key";
        const LS_KEY_KB = "physics_knowledge_v2";
        const LS_KEY_CHAT = "physics_chat_history";
        const LS_KEY_THEME = "physics_theme";
        
        let apiKey = localStorage.getItem(LS_KEY_API) || "";
        let chatHistory = JSON.parse(localStorage.getItem(LS_KEY_CHAT)) || [];
        let isWaiting = false;

        window.onload = () => {
            initKnowledgeBase();
            initTheme();
            document.getElementById('apiKeyInput').value = apiKey;
            renderChatHistory();
        };

        function initTheme() {
            const savedTheme = localStorage.getItem(LS_KEY_THEME) || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem(LS_KEY_THEME, newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const moonPath = document.getElementById('moonPath');
            const sunPath = document.getElementById('sunPath');
            if (theme === 'dark') { moonPath.style.display = 'none'; sunPath.style.display = 'block'; }
            else { moonPath.style.display = 'block'; sunPath.style.display = 'none'; }
        }

        function saveApiKey() {
            apiKey = document.getElementById('apiKeyInput').value.trim();
            localStorage.setItem(LS_KEY_API, apiKey);
            showToast("API key সংরক্ষিত");
            closeAllPanels();
        }

        function togglePanel(panelId) {
            const panel = document.getElementById(panelId);
            const overlay = document.getElementById('overlay');
            const isOpen = panel.classList.contains('open');
            closeAllPanels();
            if (!isOpen) { panel.classList.add('open'); overlay.classList.add('active'); }
        }

        function closeAllPanels() {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('open'));
            document.getElementById('overlay').classList.remove('active');
        }

        function showToast(msg) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast'; toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function autoResize(t) { t.style.height = 'auto'; t.style.height = t.scrollHeight + 'px'; }

        function handleEnter(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

        function getKB() { return JSON.parse(localStorage.getItem(LS_KEY_KB)) || []; }
        function setKB(d) { localStorage.setItem(LS_KEY_KB, JSON.stringify(d)); renderKnowledgeList(); }

        function initKnowledgeBase() {
            if (!localStorage.getItem(LS_KEY_KB)) setKB([{id: 1, topic: "নিউটনের সূত্র", content: "F = ma", addedAt: Date.now()}]);
            else renderKnowledgeList();
        }

        function renderKnowledgeList() {
            const list = document.getElementById('kbList');
            list.innerHTML = "";
            getKB().forEach(item => {
                const div = document.createElement('div');
                div.className = 'kb-item';
                div.innerHTML = `<div class="kb-item-title">${item.topic}</div><div class="kb-item-content">${item.content}</div>`;
                list.appendChild(div);
            });
        }

        function addManualNote() {
            const text = document.getElementById('manualNote').value.trim();
            if (!text) return;
            const kb = getKB();
            kb.push({ id: Date.now(), topic: text.substring(0, 20), content: text, addedAt: Date.now() });
            setKB(kb);
            document.getElementById('manualNote').value = "";
            showToast("নোট সংরক্ষিত হয়েছে");
        }

        function renderChatHistory() {
            const container = document.getElementById('chatContainer');
            container.innerHTML = "";
            if (chatHistory.length === 0) appendMessageToUI("model", "হ্যালো! আমি পদার্থ সহকারী। পদার্থবিজ্ঞানের যে কোনো বিষয়ে আমাকে প্রশ্ন করতে পারো।");
            else chatHistory.forEach(m => appendMessageToUI(m.role, m.parts[0].text));
        }

        function appendMessageToUI(role, text) {
            const container = document.getElementById('chatContainer');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            let actions = "";
            if (role === 'model') {
                const safeText = encodeURIComponent(text);
                actions = `
                    <div class="ai-actions">
                        <button class="ai-action-btn" onclick="explainSimply(decodeURIComponent('${safeText}'))">✨ সহজ ব্যাখ্যা</button>
                        <button class="ai-action-btn" onclick="solveMath(decodeURIComponent('${safeText}'))">✨ গাণিতিক সমাধান</button>
                        <button class="ai-action-btn" onclick="speakText(decodeURIComponent('${safeText}'), this)">✨ শুনুন</button>
                    </div>
                `;
            }
            msgDiv.innerHTML = `
                <div class="bubble">
                    <div>${text.replace(/\n/g, '<br>')}</div>
                    ${actions}
                </div>
            `;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
            renderMathInElement(msgDiv, { delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}] });
            return msgDiv;
        }

        async function callGemini(prompt, systemInstruction = "") {
            const payload = { contents: [{ role: "user", parts: [{ text: prompt }] }] };
            if (systemInstruction) payload.systemInstruction = { parts: [{ text: systemInstruction }] };
            const res = await fetch(API_URL + apiKey, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!res.ok) throw new Error("API Error");
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || isWaiting) return;
            if (!apiKey) { showToast("সেটিংসে API Key দিন"); togglePanel('settingsPanel'); return; }
            input.value = ""; autoResize(input);
            appendMessageToUI("user", text);
            isWaiting = true;
            try {
                const kbContext = getKB().map(i => i.content).join("\n");
                const system = "তুমি একজন পদার্থবিজ্ঞান শিক্ষক। উত্তর বাংলায় দাও। Tiro Bangla ফন্ট স্টাইলে পড়ার উপযোগী করে গুছিয়ে লিখবে। তোমার জ্ঞানভাণ্ডার: " + kbContext;
                const reply = await callGemini(text, system);
                appendMessageToUI("model", reply);
                chatHistory.push({role: "user", parts:[{text}]}, {role: "model", parts:[{text: reply}]});
                localStorage.setItem(LS_KEY_CHAT, JSON.stringify(chatHistory.slice(-10)));
            } catch (e) { appendMessageToUI("model", "এপিআই সংযোগে সমস্যা হচ্ছে।"); }
            finally { isWaiting = false; }
        }

        async function explainSimply(text) {
            if (!apiKey) return;
            appendMessageToUI("user", "✨ এটি আরও সহজ করে বোঝাও।");
            const reply = await callGemini(`নিচের বিষয়টি একজন ১০ বছরের শিশুকে সহজ উদাহরণ দিয়ে বাংলায় বুঝিয়ে বলো: \n"${text}"`);
            appendMessageToUI("model", reply);
        }

        async function solveMath(text) {
            if (!apiKey) return;
            appendMessageToUI("user", "✨ একটি অংক সমাধান করো।");
            const reply = await callGemini(`নিচের বিষয়ের ওপর ভিত্তি করে একটি গাণিতিক সমস্যা তৈরি করো এবং তার সমাধান বাংলায় ধাপে ধাপে দেখাও। LaTeX ব্যবহার করো: \n"${text}"`);
            appendMessageToUI("model", reply);
        }

        async function generateQuiz() {
            if (!apiKey) return;
            const topics = getKB().map(i => i.topic).join(", ") || "বলবিদ্যা";
            appendMessageToUI("user", "✨ আমাকে একটি কুইজ দাও।");
            const reply = await callGemini(`নিচের বিষয়গুলোর ওপর একটি ৩-প্রশ্নের কুইজ বাংলায় তৈরি করো। সঠিক উত্তর শেষে দিয়ে দিও: \n${topics}`);
            appendMessageToUI("model", reply);
        }

        async function summarizeKnowledge() {
            if (!apiKey || getKB().length === 0) return;
            const content = getKB().map(i => i.content).join("\n");
            appendMessageToUI("user", "✨ নোটগুলোর সারাংশ দাও।");
            const reply = await callGemini(`নিচের পদার্থবিজ্ঞানের নোটগুলো থেকে গুরুত্বপূর্ণ পয়েন্টগুলো নিয়ে একটি ছোট সারাংশ বাংলায় তৈরি করো: \n${content}`);
            appendMessageToUI("model", reply);
        }

        async function speakText(text, btn) {
            if (!apiKey) return;
            const originalText = btn.innerText;
            btn.innerText = "⏳..."; btn.disabled = true;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Say clearly in Bengali: " + text }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                        }
                    })
                });
                const result = await response.json();
                const pcmData = result.candidates[0].content.parts[0].inlineData.data;
                const audioBlob = b64toBlob(pcmData, 'audio/L16');
                const audioUrl = URL.createObjectURL(audioBlob);
                new Audio(audioUrl).play();
            } catch (e) { showToast("অডিও তৈরি করা যায়নি"); }
            finally { btn.innerText = originalText; btn.disabled = false; }
        }

        function b64toBlob(b64Data, contentType) {
            const byteCharacters = atob(b64Data);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) byteNumbers[i] = byteCharacters.charCodeAt(i);
            return new Blob([new Uint8Array(byteNumbers)], {type: contentType});
        }
        
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const kb = getKB();
                kb.push({ id: Date.now(), topic: file.name, content: e.target.result.substring(0, 1000), addedAt: Date.now() });
                setKB(kb);
                showToast("ফাইল যুক্ত হয়েছে");
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
