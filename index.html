<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>পদার্থ সহকারী — বাংলা পদার্থবিজ্ঞান চ্যাটবট</title>
<meta name="description" content="SSC/HSC পদার্থবিজ্ঞান শিক্ষার্থীদের জন্য AI চ্যাটবট।">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#4F46E5;--primary-light:#EEF2FF;
  --bg:#F9FAFB;--surface:#FFFFFF;--text:#111827;--text-muted:#6B7280;
  --border:#E5E7EB;--user-bubble:#4F46E5;--bot-bubble:#FFFFFF;--danger:#EF4444;
  --shadow:0 1px 3px rgba(0,0,0,.1);--radius:12px;
}
.dark{
  --bg:#0F172A;--surface:#1E293B;--text:#F1F5F9;--text-muted:#94A3B8;
  --border:#334155;--bot-bubble:#1E293B;--primary-light:#1E293B;
  --shadow:0 1px 3px rgba(0,0,0,.4);
}
html{font-size:16px}
body{font-family:'Tiro Bangla','Segoe UI',Tahoma,serif;background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;height:100dvh;overflow:hidden;transition:background .3s,color .3s}

/* ---- HEADER ---- */
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;
  background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.header-left{display:flex;align-items:center;gap:8px}
.header-left svg{width:28px;height:28px}
.header-left h1{font-size:1.15rem;font-weight:700;color:var(--primary)}
.header-right{display:flex;gap:6px}
.icon-btn{background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;color:var(--text);
  display:flex;align-items:center;justify-content:center;transition:background .2s}
.icon-btn:hover{background:var(--primary-light)}
.icon-btn svg{width:22px;height:22px}

/* ---- CHAT AREA ---- */
.chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:8px;max-width:85%;animation:fadeUp .3s ease}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.bot{align-self:flex-start}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--primary-light);display:flex;
  align-items:center;justify-content:center;flex-shrink:0}
.avatar svg{width:18px;height:18px}
.bubble{padding:10px 14px;border-radius:var(--radius);line-height:1.6;font-size:.95rem;
  word-break:break-word;white-space:pre-wrap;box-shadow:var(--shadow)}
.msg.user .bubble{background:var(--user-bubble);color:#fff;border-bottom-right-radius:4px}
.msg.bot .bubble{background:var(--bot-bubble);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg.error .bubble{background:#FEF2F2;border-color:var(--danger);color:var(--danger)}
.dark .msg.error .bubble{background:#3B1111}
.msg .time{font-size:.7rem;color:var(--text-muted);margin-top:4px;text-align:right}
.msg.bot .time{text-align:left}

/* loading dots */
.loading-dots{display:flex;gap:4px;padding:8px 0}
.loading-dots span{width:8px;height:8px;border-radius:50%;background:var(--primary);
  animation:bounce 1s infinite}
.loading-dots span:nth-child(2){animation-delay:.15s}
.loading-dots span:nth-child(3){animation-delay:.3s}

/* ---- INPUT BAR ---- */
.input-bar{display:flex;align-items:flex-end;gap:8px;padding:10px 16px;
  background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.input-bar textarea{flex:1;resize:none;border:1px solid var(--border);border-radius:var(--radius);
  padding:10px 12px;font-size:.95rem;font-family:inherit;background:var(--bg);color:var(--text);
  max-height:100px;min-height:42px;line-height:1.4;outline:none;transition:border .2s}
.input-bar textarea:focus{border-color:var(--primary)}
.input-bar textarea:disabled{opacity:.5}
.send-btn{width:42px;height:42px;border-radius:50%;background:var(--primary);color:#fff;border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.send-btn svg{width:20px;height:20px}
.attach-btn,.kb-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);padding:6px;
  border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.attach-btn:hover,.kb-btn:hover{background:var(--primary-light)}
.attach-btn svg,.kb-btn svg{width:20px;height:20px}

/* ---- PANELS (settings & knowledge) ---- */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:50;opacity:0;
  pointer-events:none;transition:opacity .3s}
.overlay.active{opacity:1;pointer-events:auto}
.panel{position:fixed;top:0;bottom:0;width:340px;max-width:100%;background:var(--surface);
  z-index:60;display:flex;flex-direction:column;transition:transform .3s ease;box-shadow:-4px 0 20px rgba(0,0,0,.15)}
.panel.right{right:0;transform:translateX(100%)}
.panel.left{left:0;transform:translateX(-100%)}
.panel.active{transform:translateX(0)}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;
  border-bottom:1px solid var(--border);font-weight:700;font-size:1.05rem}
.panel-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.field label{display:block;font-size:.85rem;color:var(--text-muted);margin-bottom:4px}
.field input,.field textarea{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;
  font-size:.9rem;background:var(--bg);color:var(--text);font-family:inherit;outline:none}
.field input:focus,.field textarea:focus{border-color:var(--primary)}
.field textarea{min-height:100px;resize:vertical}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:40px}
.pw-toggle{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;
  border:none;cursor:pointer;color:var(--text-muted);font-size:.8rem}
.btn{padding:10px 16px;border-radius:8px;border:none;cursor:pointer;font-size:.9rem;font-weight:600;
  transition:opacity .2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}
.btn:hover{opacity:.85}
.btn-row{display:flex;gap:8px}
.link{color:var(--primary);font-size:.85rem;text-decoration:underline;cursor:pointer}

/* knowledge list */
.kb-item{display:flex;justify-content:space-between;align-items:flex-start;padding:10px;
  border:1px solid var(--border);border-radius:8px;gap:8px}
.kb-item-content{flex:1;font-size:.85rem;line-height:1.5}
.kb-item-topic{font-weight:600;color:var(--primary);font-size:.8rem}
.kb-item-source{color:var(--text-muted);font-size:.75rem}
.kb-del{background:none;border:none;color:var(--danger);cursor:pointer;font-size:1.1rem;padding:2px 6px}
.kb-count{font-size:.85rem;color:var(--text-muted);text-align:center;padding:4px 0}

/* drop zone */
.drop-zone{border:2px dashed var(--border);border-radius:8px;padding:24px;text-align:center;
  color:var(--text-muted);font-size:.85rem;cursor:pointer;transition:border-color .2s}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--primary);background:var(--primary-light)}

/* ---- TOAST ---- */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface);
  color:var(--text);padding:10px 20px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.2);
  font-size:.9rem;z-index:100;animation:fadeUp .3s ease;pointer-events:none;border:1px solid var(--border)}

/* ---- ANIMATIONS ---- */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}

/* ---- SCROLLBAR ---- */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ---- KaTeX overrides ---- */
.katex{font-size:1em!important}
.katex-display{margin:.6em 0!important;overflow-x:auto;overflow-y:hidden}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="8" fill="var(--primary)"/>
      <ellipse cx="50" cy="50" rx="40" ry="16" stroke="var(--primary)" stroke-width="3" fill="none"/>
      <ellipse cx="50" cy="50" rx="40" ry="16" stroke="var(--primary)" stroke-width="3" fill="none" transform="rotate(60 50 50)"/>
      <ellipse cx="50" cy="50" rx="40" ry="16" stroke="var(--primary)" stroke-width="3" fill="none" transform="rotate(120 50 50)"/>
    </svg>
    <h1>পদার্থ সহকারী</h1>
  </div>
  <div class="header-right">
    <button class="icon-btn" onclick="togglePanel('settings')" title="সেটিংস">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <button class="icon-btn" onclick="toggleTheme()" title="থিম পরিবর্তন" id="themeBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</div>

<!-- CHAT -->
<div class="chat-area" id="chatArea"></div>

<!-- INPUT -->
<div class="input-bar">
  <button class="kb-btn" onclick="togglePanel('kb')" title="নোট যোগ করুন">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
  </button>
  <button class="attach-btn" onclick="fileInput.click()" title="ফাইল আপলোড">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.49"/></svg>
  </button>
  <input type="file" id="fileInput" accept=".txt,.pdf" hidden onchange="handleFileUpload(this)">
  <textarea id="msgInput" rows="1" placeholder="আপনার প্রশ্ন লিখুন..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeAllPanels()"></div>

<!-- SETTINGS PANEL -->
<div class="panel right" id="settingsPanel">
  <div class="panel-header">সেটিংস <button class="icon-btn" onclick="closeAllPanels()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
  <div class="panel-body">
    <div class="field">
      <label>Gemini API Key</label>
      <div class="pw-wrap">
        <input type="password" id="apiKeyInput" placeholder="AIza...">
        <button class="pw-toggle" onclick="togglePw()">দেখুন</button>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveApiKey()">সংরক্ষণ</button>
      <button class="btn btn-outline" onclick="testApiKey()">পরীক্ষা</button>
    </div>
    <a class="link" href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">→ API key নিন aistudio.google.com থেকে</a>
  </div>
</div>

<!-- KNOWLEDGE BASE PANEL -->
<div class="panel left" id="kbPanel">
  <div class="panel-header">নলেজবেজ <button class="icon-btn" onclick="closeAllPanels()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
  <div class="panel-body">
    <div class="kb-count" id="kbCount"></div>
    <div class="drop-zone" id="dropZone" onclick="fileInput.click()">
      ফাইল টেনে আনুন অথবা ক্লিক করুন<br><small>.txt, .pdf</small>
    </div>
    <div class="field">
      <label>নতুন নোট যোগ করুন</label>
      <textarea id="kbNoteInput" placeholder="পদার্থবিজ্ঞানের তথ্য লিখুন..."></textarea>
    </div>
    <button class="btn btn-primary" onclick="saveManualNote()">সংরক্ষণ করুন</button>
    <div id="kbList" style="display:flex;flex-direction:column;gap:8px"></div>
  </div>
</div>

<script>
// ============ স্টেট ============
let apiKey = localStorage.getItem('physics_gemini_key') || '';
let knowledge = [];
let chatHistory = [];
let isLoading = false;

// ============ ডিফল্ট নলেজবেজ ============
const DEFAULT_KB = [
  {topic:"নিউটনের ১ম সূত্র",content:"নিউটনের ১ম সূত্র (জড়তার সূত্র): বাহ্যিক বল প্রয়োগ না করলে স্থির বস্তু স্থিরই থাকবে এবং গতিশীল বস্তু সমবেগে সরলরেখায় চলতে থাকবে।",source:"NCTB SSC Chapter 3"},
  {topic:"নিউটনের ২য় সূত্র",content:"নিউটনের ২য় সূত্র: বস্তুর ভরবেগের পরিবর্তনের হার প্রযুক্ত বলের সমানুপাতিক। সূত্র: $F = ma$, যেখানে F = বল (N), m = ভর (kg), a = ত্বরণ (m/s²)।",source:"NCTB SSC Chapter 3"},
  {topic:"নিউটনের ৩য় সূত্র",content:"নিউটনের ৩য় সূত্র: প্রতিটি ক্রিয়ার একটি সমান ও বিপরীত প্রতিক্রিয়া আছে। $\\vec{F}_{12} = -\\vec{F}_{21}$",source:"NCTB SSC Chapter 3"},
  {topic:"মহাকর্ষ সূত্র",content:"নিউটনের মহাকর্ষ সূত্র: $F = \\frac{Gm_1 m_2}{r^2}$, যেখানে $G = 6.674 \\times 10^{-11}$ Nm²kg⁻²। যেকোনো দুটি বস্তু পরস্পরকে আকর্ষণ করে।",source:"NCTB HSC Chapter 6"},
  {topic:"গতিশক্তি",content:"গতিশক্তি: গতিশীল বস্তুর শক্তি। সূত্র: $E_k = \\frac{1}{2}mv^2$, যেখানে m = ভর, v = বেগ।",source:"NCTB SSC Chapter 4"},
  {topic:"বিভবশক্তি",content:"মহাকর্ষীয় বিভবশক্তি: $E_p = mgh$, যেখানে m = ভর, g = অভিকর্ষজ ত্বরণ (9.8 m/s²), h = উচ্চতা।",source:"NCTB SSC Chapter 4"},
  {topic:"ওহমের সূত্র",content:"ওহমের সূত্র: তাপমাত্রা স্থির থাকলে, পরিবাহীর দুই প্রান্তের বিভব পার্থক্য তার মধ্য দিয়ে প্রবাহিত তড়িৎ প্রবাহের সমানুপাতিক। $V = IR$, যেখানে V = বিভব পার্থক্য (V), I = তড়িৎ প্রবাহ (A), R = রোধ (Ω)।",source:"NCTB SSC Chapter 9"},
  {topic:"তরঙ্গ সমীকরণ",content:"তরঙ্গ সমীকরণ: $v = f\\lambda$, যেখানে v = তরঙ্গের বেগ (m/s), f = কম্পাঙ্ক (Hz), λ = তরঙ্গদৈর্ঘ্য (m)।",source:"NCTB SSC Chapter 7"},
  {topic:"স্নেলের সূত্র",content:"আলোর প্রতিসরণ — স্নেলের সূত্র: $n = \\frac{\\sin i}{\\sin r}$, যেখানে n = প্রতিসরাঙ্ক, i = আপতন কোণ, r = প্রতিসরণ কোণ।",source:"NCTB SSC Chapter 8"},
  {topic:"কাজ-শক্তি উপপাদ্য",content:"কাজ: $W = Fs\\cos\\theta$, যেখানে F = বল, s = সরণ, θ = বল ও সরণের মধ্যবর্তী কোণ। কাজের একক জুল (J)।",source:"NCTB SSC Chapter 4"}
];

// ============ ইনিশিয়ালাইজ ============
(function init(){
  // থিম লোড
  if(localStorage.getItem('physics_theme')==='dark') document.body.classList.add('dark');
  // API key লোড
  document.getElementById('apiKeyInput').value = apiKey;
  // নলেজবেজ লোড
  const saved = localStorage.getItem('physics_knowledge_v2');
  if(saved){ try{ knowledge=JSON.parse(saved); }catch(e){ knowledge=[]; } }
  if(!knowledge.length){ knowledge = DEFAULT_KB.map((k,i)=>({id:'default_'+i,topic:k.topic,content:k.content,source:k.source,addedAt:new Date().toISOString()})); saveKB(); }
  // চ্যাট হিস্ট্রি লোড
  const ch = localStorage.getItem('physics_chat_history');
  if(ch){ try{ chatHistory=JSON.parse(ch); }catch(e){ chatHistory=[]; } }
  renderKBList();
  // ড্র্যাগ অ্যান্ড ড্রপ
  const dz=document.getElementById('dropZone');
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover')});
  dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');if(e.dataTransfer.files.length)processFile(e.dataTransfer.files[0])});
  // স্বাগত বার্তা
  addBotBubble('আসসালামু আলাইকুম! আমি পদার্থ সহকারী 🔬\nপদার্থবিজ্ঞানের যেকোনো প্রশ্ন করুন — SSC/HSC লেভেলের উত্তর সূত্রসহ দেবো।');
})();

  try{

// ============ টোস্ট ============
function showToast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}

// ============ চ্যাট UI ============
function addUserBubble(text){
  const d=document.createElement('div');d.className='msg user';
  d.innerHTML=`<div><div class="bubble">${esc(text)}</div><div class="time">${timeNow()}</div></div>`;
  document.getElementById('chatArea').appendChild(d);scrollDown();
}
function addBotBubble(text,isError){
  const d=document.createElement('div');d.className='msg bot'+(isError?' error':'');
  d.innerHTML=`<div class="avatar"><svg viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="6" fill="var(--primary)"/><ellipse cx="50" cy="50" rx="30" ry="12" stroke="var(--primary)" stroke-width="3" fill="none"/><ellipse cx="50" cy="50" rx="30" ry="12" stroke="var(--primary)" stroke-width="3" fill="none" transform="rotate(60 50 50)"/><ellipse cx="50" cy="50" rx="30" ry="12" stroke="var(--primary)" stroke-width="3" fill="none" transform="rotate(120 50 50)"/></svg></div><div><div class="bubble">${formatMsg(text)}</div><div class="time">${timeNow()}</div></div>`;
  document.getElementById('chatArea').appendChild(d);
  // KaTeX রেন্ডার
  try{renderMathInElement(d.querySelector('.bubble'),{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false})}catch(e){}
  scrollDown();
}
function showLoading(){
  const d=document.createElement('div');d.className='msg bot';d.id='loadingMsg';
  d.innerHTML=`<div class="avatar"><svg viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="6" fill="var(--primary)"/><ellipse cx="50" cy="50" rx="30" ry="12" stroke="var(--primary)" stroke-width="3" fill="none"/></svg></div><div><div class="bubble">উত্তর খুঁজছি...<div class="loading-dots"><span></span><span></span><span></span></div></div></div>`;
  document.getElementById('chatArea').appendChild(d);scrollDown();
}
function removeLoading(){const l=document.getElementById('loadingMsg');if(l)l.remove()}
function scrollDown(){const c=document.getElementById('chatArea');c.scrollTop=c.scrollHeight}
function timeNow(){return new Date().toLocaleTimeString('bn-BD',{hour:'2-digit',minute:'2-digit'})}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function formatMsg(text){
  // বেসিক মার্কডাউন: **bold**, \n→<br>
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
}

// ============ ইনপুট ============
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px'}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}

// ============ নলেজবেজ রিট্রিভাল ============
function retrieveChunks(question){
  const words=question.toLowerCase().split(/\s+/).filter(w=>w.length>1);
  const scored=knowledge.map(k=>{
    const text=(k.topic+' '+k.content).toLowerCase();
    let score=0;words.forEach(w=>{if(text.includes(w))score++});
    return{...k,score};
  }).filter(k=>k.score>0).sort((a,b)=>b.score-a.score).slice(0,3);
  if(!scored.length)return '';
  return scored.map(k=>`বিষয়: ${k.topic}\n${k.content}\n---`).join('\n');
}

// ============ বার্তা পাঠানো ============
async function sendMessage(){
  const inp=document.getElementById('msgInput');
  const text=inp.value.trim();if(!text||isLoading)return;
  if(!apiKey){addBotBubble('⚙️ Settings থেকে API key দিন',true);return}
  inp.value='';inp.style.height='auto';
  addUserBubble(text);
  // নলেজ কন্টেক্সট
  const context=retrieveChunks(text);
  const sysPrompt=`তুমি একজন অভিজ্ঞ পদার্থবিজ্ঞান শিক্ষক। তোমার কাজ শুধুমাত্র পদার্থবিজ্ঞান বিষয়ক প্রশ্নের উত্তর দেওয়া।\nযদি কেউ পদার্থবিজ্ঞান ছাড়া অন্য বিষয়ে প্রশ্ন করে, বিনয়ের সাথে বলো: "আমি শুধু পদার্থবিজ্ঞানের প্রশ্নের উত্তর দিতে পারি।"\nনিচের নলেজবেজ থেকে প্রাসঙ্গিক তথ্য ব্যবহার করো:\n${context||'(কোনো প্রাসঙ্গিক তথ্য পাওয়া যায়নি)'}\n\nউত্তর দেওয়ার নিয়ম:\n1. সবসময় বাংলায় উত্তর দাও\n2. সূত্র LaTeX format এ দাও: inline এ $সূত্র$ এবং block এ $$সূত্র$$\n3. ধাপে ধাপে সমাধান দেখাও (যদি অংক হয়)\n4. সহজ উদাহরণ দাও\n5. উত্তরের শেষে সংশ্লিষ্ট অধ্যায় উল্লেখ করো`;
  // চ্যাট হিস্ট্রি (শেষ ৮টি বার্তা)
  chatHistory.push({role:'user',parts:[{text}]});
  if(chatHistory.length>8)chatHistory=chatHistory.slice(-8);
  isLoading=true;setInputState(false);showLoading();
  try{
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        system_instruction:{parts:[{text:sysPrompt}]},
        contents:chatHistory,
        generationConfig:{temperature:0.7,maxOutputTokens:2048}
      })
    });
    removeLoading();
    if(!r.ok){const d=await r.json();throw new Error(d.error?.message||'API ত্রুটি: '+r.status)}
    const d=await r.json();
    const reply=d.candidates?.[0]?.content?.parts?.[0]?.text||'উত্তর পাওয়া যায়নি।';
    chatHistory.push({role:'model',parts:[{text:reply}]});
    if(chatHistory.length>8)chatHistory=chatHistory.slice(-8);
    localStorage.setItem('physics_chat_history',JSON.stringify(chatHistory));
    addBotBubble(reply);
  }catch(e){
    removeLoading();addBotBubble('❌ '+e.message,true);
  }
  isLoading=false;setInputState(true);
}
function setInputState(enabled){
  document.getElementById('msgInput').disabled=!enabled;
  document.getElementById('sendBtn').disabled=!enabled;
}

// ============ নলেজবেজ ============
function saveKB(){localStorage.setItem('physics_knowledge_v2',JSON.stringify(knowledge));renderKBList()}
function renderKBList(){
  document.getElementById('kbCount').textContent=`মোট ${knowledge.length} টি তথ্য সংরক্ষিত`;
  const list=document.getElementById('kbList');list.innerHTML='';
  knowledge.forEach(k=>{
    const d=document.createElement('div');d.className='kb-item';
    d.innerHTML=`<div class="kb-item-content"><div class="kb-item-topic">${esc(k.topic)}</div>${esc(k.content.slice(0,120))}${k.content.length>120?'...':''}<div class="kb-item-source">${esc(k.source||'')}</div></div><button class="kb-del" onclick="deleteKB('${k.id}')" title="মুছুন">×</button>`;
    list.appendChild(d);
  });
}
function deleteKB(id){knowledge=knowledge.filter(k=>k.id!==id);saveKB();showToast('তথ্য মুছে ফেলা হয়েছে')}
function saveManualNote(){
  const inp=document.getElementById('kbNoteInput');const text=inp.value.trim();if(!text)return;
  knowledge.push({id:'m_'+Date.now(),topic:text.slice(0,50),content:text,source:'ম্যানুয়াল নোট',addedAt:new Date().toISOString()});
  saveKB();inp.value='';showToast('১ টি তথ্য যোগ হয়েছে');
}

// ============ ফাইল আপলোড ============
function handleFileUpload(input){if(input.files.length)processFile(input.files[0]);input.value=''}
async function processFile(file){
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==='txt'){
    const text=await file.text();chunkAndSave(text,file.name);
  }else if(ext==='pdf'){
    try{
      const buf=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:buf}).promise;
      let text='';
      for(let i=1;i<=pdf.numPages;i++){const p=await pdf.getPage(i);const c=await p.getTextContent();text+=c.items.map(x=>x.str).join(' ')+'\n'}
      chunkAndSave(text,file.name);
    }catch(e){showToast('PDF পড়তে সমস্যা: '+e.message)}
  }else{showToast('শুধু .txt এবং .pdf সমর্থিত')}
}
// ৬০০ অক্ষরে ভাগ
function chunkAndSave(text,fname){
  const sentences=text.replace(/\r/g,'').split(/(?<=[।.!?\n])\s*/);
  let chunk='',count=0;
  sentences.forEach(s=>{
    if((chunk+s).length>600&&chunk){
      knowledge.push({id:'f_'+Date.now()+'_'+(count++),topic:chunk.slice(0,50),content:chunk.trim(),source:fname,addedAt:new Date().toISOString()});
      chunk='';
    }
    chunk+=s+' ';
  });
  if(chunk.trim()){knowledge.push({id:'f_'+Date.now()+'_'+(count++),topic:chunk.slice(0,50),content:chunk.trim(),source:fname,addedAt:new Date().toISOString()})}
  saveKB();showToast(`${count} টি তথ্য যোগ হয়েছে`);
}
